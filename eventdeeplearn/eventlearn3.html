<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      #main {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #e4e0e0;
      }
      h1 {
        color: #555;
        font-size: 10rem;
        font-weight: 100;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <h1 id="head">a</h1>
    </div>
  </body>
  <script>
    let hh1 = document.querySelector("#head");
    window.addEventListener("keydown", function (dets) {
      //console.log((dets));
      //hh1.textContent = dets.key;
      if (dets.key == " ") {
        hh1.textContent = "SPC";
      } else {
        hh1.textContent = dets.key;
      }
    });
  </script>
</html>
