<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Gilory";
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }
      #main {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #e4e0e0;
      }
      input {
        display: none;
      }

      #btn {
        padding: 12px 22px;
        background-color: #087983;
        color: aliceblue;
        border-radius: 5px;
      }
      #btn:hover {
        background-color: #a916b0;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <input type="file" id="inpf" />
      <button id="btn">Upload File</button>
    </div>
  </body>
  <script>
    let btn1 = document.querySelector("#btn");
    let nplf = document.querySelector("#inpf");

    btn1.addEventListener("click", function () {
      nplf.click();
    });
    nplf.addEventListener("change", function (e) {
      btn1.textContent = e.target.files[0].name;
    });
  </script>
</html>
